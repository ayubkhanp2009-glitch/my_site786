    let currentPage = 1;
    const videosPerPage = 20;

    function renderVideos(page) {
      currentPage = Math.max(1, Math.min(page, Math.ceil(allVideos.length / videosPerPage)));

      const grid = document.getElementById('videoGrid');
      grid.innerHTML = '';

      const start = (currentPage - 1) * videosPerPage;
      const end = start + videosPerPage;
      const videosToShow = allVideos.slice(start, end);

      videosToShow.forEach(video => {
        const cardHTML = `
          <div class="video-card">
            <div class="thumbnail">
              <a href="${video.link}" target="_blank">
                <img src="${video.thumb}" loading="lazy" alt="${video.title}">
                <span class="duration">${video.duration}</span>
                <div class="overlay">Watch Now</div>
                ${video.trending ? '<div class="trending">TRENDING</div>' : ''}
              </a>
            </div>
            <div class="info">
              <div class="title"><a href="${video.link}" target="_blank">${video.title}</a></div>
              <div class="meta">
                <span>Views: <span class="view-count">Loading...</span></span>
                <span>Recent</span>
              </div>
            </div>
          </div>
        `;
        grid.innerHTML += cardHTML;
      });

      renderPagination();
      window.scrollTo(0, 0);
      history.pushState({ page: currentPage }, `Page ${currentPage}`, `#page-${currentPage}`);
    }

    function renderPagination() {
      const totalPages = Math.ceil(allVideos.length / videosPerPage);
      const paginationDiv = document.getElementById('pagination');
      paginationDiv.innerHTML = '';

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === currentPage) btn.classList.add('active');
        btn.onclick = () => renderVideos(i);
        paginationDiv.appendChild(btn);
      }
    }

    function filterVideos() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      document.querySelectorAll('.video-card').forEach(card => {
        const title = card.querySelector('.title a').textContent.toLowerCase();
        card.style.display = title.includes(query) ? '' : 'none';
      });
    }

    // Back Button Fix
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.page) {
        renderVideos(event.state.page);
      } else {
        const page = parseInt(window.location.hash.replace('#page-', '')) || 1;
        renderVideos(page);
      }
    });

    window.onload = () => {
      const hashPage = parseInt(window.location.hash.replace('#page-', '')) || 1;
      renderVideos(hashPage);
    };
  </script>
